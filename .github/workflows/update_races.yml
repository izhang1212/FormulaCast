name: Update Race Predictions

# Runs every Monday at 04:00 UTC — well after Sunday's race ends.
# Can also be triggered manually from GitHub → Actions → "Run workflow".
on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}
  FORMULACAST_DATA_ROOT: ${{ github.workspace }}/backend/data
  FORMULACAST_CACHE_DIR: ${{ github.workspace }}/backend/f1_cache

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # needed to push the updated prediction JSONs

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # Cache the FastF1 HTTP cache so completed sessions don't get re-downloaded
      # on every run — only the new round is fetched from the F1 CDN.
      - name: Restore FastF1 cache
        uses: actions/cache@v4
        with:
          path: backend/f1_cache
          key: fastf1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: fastf1-${{ runner.os }}-

      # ── Data: pull from F1 and sync with Supabase ──────────────────────────

      - name: Download season CSVs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        run: |
          python - <<'EOF'
          from backend.cloud_storage import hydrate_seasons_from_supabase
          files = hydrate_seasons_from_supabase()
          if files:
              print(f"Downloaded {len(files)} file(s): {files}")
          else:
              print("Supabase not configured or bucket empty — skipping download.")
          EOF

      - name: Pull latest race data from FastF1
        run: |
          python - <<'EOF'
          import pandas as pd
          from backend.update_seasons import pull_one_season
          year = int(pd.Timestamp.utcnow().year)
          print(f"Pulling current season {year} ...")
          try:
              ok = pull_one_season(year)
          except Exception as exc:
              print(f"Season {year} pull raised an unexpected error: {exc}")
              ok = False
          if ok:
              print(f"Season {year} updated successfully.")
          else:
              print(f"Season {year}: no data pulled — will retry next run.")
          EOF

      - name: Upload updated season CSVs to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        run: |
          python - <<'EOF'
          from backend.cloud_storage import push_seasons_to_supabase
          files = push_seasons_to_supabase()
          if files:
              print(f"Uploaded {len(files)} file(s) to Supabase.")
          else:
              print("Supabase not configured — skipping upload.")
          EOF

      # ── Predictions: rebuild and sync to frontend ───────────────────────────

      - name: Rebuild prediction JSONs
        run: |
          python - <<'EOF'
          import sys
          from backend.config import DATA_ROOT
          seasons_dir = DATA_ROOT / "processed" / "seasons"
          season_files = list(seasons_dir.glob("season_*.csv")) if seasons_dir.exists() else []
          if not season_files:
              print("No season CSVs on disk — skipping export.")
              sys.exit(0)
          print(f"Found {len(season_files)} season file(s). Exporting future predictions and performance...")
          try:
              from backend.exporters import export_future_predictions, export_performance
              export_future_predictions()
              export_performance()
              print("Export complete.")
          except Exception as exc:
              import traceback
              print(f"Export failed: {exc}")
              traceback.print_exc()
              sys.exit(0)
          EOF

      - name: Seed historical round JSONs into data dir
        run: |
          mkdir -p "$FORMULACAST_DATA_ROOT/predictions"
          cp -rn frontend/public/predictions/. "$FORMULACAST_DATA_ROOT/predictions/"
          echo "Seeded $(find "$FORMULACAST_DATA_ROOT/predictions" -name 'round_*.json' | wc -l) historical round JSON(s)."

      - name: Export new completed rounds to Replay
        run: |
          python - <<'EOF'
          import sys
          from backend.config import DATA_ROOT
          seasons_dir = DATA_ROOT / "processed" / "seasons"
          season_files = list(seasons_dir.glob("season_*.csv")) if seasons_dir.exists() else []
          if len(season_files) < 2:
              print(f"Only {len(season_files)} season CSV(s) on disk — need at least 2 to train. Skipping Replay export.")
              sys.exit(0)
          try:
              from backend.exporters import export_current_season_historical
              export_current_season_historical()
          except Exception as exc:
              import traceback
              print(f"Current-season historical export failed: {exc}")
              traceback.print_exc()
              sys.exit(0)
          EOF

      - name: Sync predictions to frontend/public
        run: |
          mkdir -p frontend/public/predictions
          cp -rf "$FORMULACAST_DATA_ROOT/predictions/." frontend/public/predictions/
          echo "Synced $(find frontend/public/predictions -name '*.json' | wc -l) JSON files."

      # ── Publish: commit the updated JSONs so Vercel redeploys ──────────────

      - name: Commit and push updated predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/predictions/
          if git diff --staged --quiet; then
            echo "Predictions unchanged — no commit needed."
          else
            CHANGED=$(git diff --staged --name-only | wc -l)
            git commit -m "chore: auto-update predictions ($CHANGED files changed)"
            git push
            echo "Pushed — Vercel will redeploy automatically."
          fi
